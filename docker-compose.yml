services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hunch
      POSTGRES_PASSWORD: hunch_dev
      POSTGRES_DB: hunch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hunch"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
